name: Publish NuGet Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Published DevScope release tag (for example v0.1.0-preview.1)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Resolve published release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          $tag = $env:EVENT_NAME -eq 'release' ? $env:EVENT_TAG : $env:INPUT_TAG
          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $tag"
          }

          $release = gh api "repos/${{ github.repository }}/releases/tags/$tag" | ConvertFrom-Json
          if ($release.draft -or $null -eq $release.published_at) {
            throw "Release $tag must already be published."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          lfs: true
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: |
          dotnet restore src/DevScope.csproj

      - name: Build
        run: |
          dotnet build src/DevScope.csproj --configuration Release --no-restore

      - name: Pack
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          $release = gh api "repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $notes = $null -ne $release.body ? $release.body : "Release $env:VERSION"
          $notes = $notes -replace '%', '%25' -replace ';', '%3B' -replace ',', '%2C' -replace '"', '%22' -replace "`r", '%0D' -replace "`n", '%0A'

          dotnet pack src/DevScope.csproj --configuration Release --no-build -p:PackageVersion=$env:VERSION -p:PackageReleaseNotes="$notes" -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg -o ${{ github.workspace }}/out

      - name: Upload NuGet packages to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: ${{ github.workspace }}/out/*.*nupkg

      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: RolandUI

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          $packages = @(Get-ChildItem -Path "${{ github.workspace }}/out" -Filter "*.nupkg" | Where-Object Name -NotLike "*.snupkg")
          if ($packages.Count -ne 1) { throw "Expected exactly one primary nupkg, found $($packages.Count)." }
          foreach ($pkg in $packages) {
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          dotnet nuget add source --username "${{ github.actor }}" --password $env:GITHUB_TOKEN --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          $packages = @(Get-ChildItem -Path "${{ github.workspace }}/out" -Filter "*.nupkg" | Where-Object Name -NotLike "*.snupkg")
          if ($packages.Count -ne 1) { throw "Expected exactly one primary nupkg, found $($packages.Count)." }
          foreach ($pkg in $packages) {
            dotnet nuget push $pkg.FullName --api-key $env:GITHUB_TOKEN --source github --skip-duplicate --no-symbols
          }
